<div class="form-group">
  <input 
  type="text" 
  [formControl]="serchControl" 
  class="form-control"
  placeholder="Search Product">
</div>

<div class="row mt-3">

  <div class="col-md-4 mb-3" *ngFor="let product of productsArr">

    <div class="card">

      <div class="card-header">
        <h5>{{product.title}}</h5>
      </div>

      <div class="card-body text-center">
        <img [src]="product.thumbnail" class="img-fluid">
      </div>

    </div>

  </div>

</div>
